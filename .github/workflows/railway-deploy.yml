name: Railway Deploy Trigger
on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: deploy, status, redeploy'
        required: true
        default: 'deploy'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/railway-deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Railway Project Status
        if: ${{ github.event.inputs.action == 'status' || github.event.inputs.action == '' }}
        run: |
          echo "Checking Railway project status..."
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"{ project(id: \"8d13148a-5cf9-4851-ab0a-2356b69f5b01\") { name services { edges { node { id name serviceInstances { edges { node { id } } } } } } } }"}')
          echo "Project status: $RESPONSE"

      - name: Get Latest Commit and Deploy
        if: ${{ github.event.inputs.action == 'deploy' || github.event.inputs.action == 'redeploy' || github.event.inputs.action == '' }}
        run: |
          echo "Triggering Railway deployment..."
          
          # Get the latest commit SHA from the repo
          COMMIT_SHA=$(curl -s -H "Authorization: token ${{ secrets.GH_PAT }}" \
            "https://api.github.com/repos/${{ github.repository }}/commits/main" | jq -r '.sha')
          echo "Latest commit SHA: $COMMIT_SHA"
          
          # Deploy using serviceInstanceDeployV2
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeployV2(input: { serviceInstanceId: \\\"6ddc47d8-6211-4e18-8ac2-5d186eee26cb\\\", source: { image: null, repo: { branch: \\\"main\\\", commitSha: \\\"$COMMIT_SHA\\\" } } }) }\"}")
          
          echo "Deploy response: $RESPONSE"
          
          # Check if deploy was triggered
          echo "$RESPONSE" | jq . || echo "Raw response: $RESPONSE"
