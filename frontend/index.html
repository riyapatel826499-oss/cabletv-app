<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
min-height: 100vh;
display: flex;
align-items: center;
justify-content: center;
font-family: 'Exo 2', sans-serif;
background: #07101e;
overflow: hidden;
}

/* ─── CANVAS background ─── */
#bg {
position: fixed;
inset: 0;
width: 100%; height: 100%;
z-index: 0;
}

/* ─── CARD ─── */
.card {
position: relative;
z-index: 1;
width: min(370px, 88vw);
background: rgba(6, 13, 26, 0.82);
border: 1px solid rgba(255,255,255,0.09);
border-radius: 20px;
padding: 0 0 30px;
backdrop-filter: blur(24px) saturate(1.3);
-webkit-backdrop-filter: blur(24px) saturate(1.3);
box-shadow:
0 0 0 1px rgba(255,255,255,0.04) inset,
0 1px 0 rgba(255,255,255,0.07) inset,
0 0 50px rgba(0, 150, 200, 0.12),
0 0 100px rgba(0, 100, 180, 0.08),
0 25px 70px rgba(0,0,0,0.70);
animation: cardIn .7s cubic-bezier(.22,1,.36,1) both;
}
@keyframes cardIn {
from { opacity:0; transform:translateY(26px) scale(.97); }
to   { opacity:1; transform:translateY(0) scale(1); }
}

/* ─── LOGO ZONE ─── */
.logo-zone {
position: relative;
width: 100%;
height: 110px;
border-radius: 20px 20px 0 0;
overflow: hidden;
display: flex;
align-items: center;
justify-content: center;
margin-bottom: 6px;
}

.wave-bg {
position: absolute;
inset: 0;
width: 100%; height: 100%;
}

.logo-row {
position: relative;
z-index: 2;
display: flex;
align-items: center;
gap: 8px;
padding: 0 24px;
}

.logo-icon-wrap {
flex-shrink: 0;
display: flex;
align-items: center;
justify-content: center;
}

.logo-text-col {
display: flex;
flex-direction: column;
align-items: flex-start;
}

.brand-name {
font-family: 'Rajdhani', sans-serif;
font-size: 32px;
font-weight: 700;
letter-spacing: 3px;
color: #ddeeff;
line-height: 1;
text-shadow: 0 0 20px rgba(100,180,255,0.2);
}
.brand-name .oo { color: #c8a030; text-shadow: 0 0 12px rgba(200,160,48,0.4); }

.tagline {
font-size: 10.5px;
font-weight: 300;
letter-spacing: 0.4px;
color: rgba(180, 200, 230, 0.6);
margin-top: 2px;
}

/* ─── CARD BODY ─── */
.card-body {
padding: 0 28px;
}

/* ─── FIELDS ─── */
.field { margin-bottom: 14px; }

.label {
font-size: 13px;
font-weight: 500;
color: #c0d0e8;
margin-bottom: 7px;
display: block;
}

.input-wrap {
position: relative;
display: flex;
align-items: center;
}

.input-ico {
position: absolute;
left: 15px;
color: rgba(63, 169, 245, 0.72);
display: flex;
pointer-events: none;
transition: color .2s;
}
.input-wrap:focus-within .input-ico { color: #3fa9f5; }

input[type="email"],
input[type="text"],
input[type="password"] {
width: 100%;
padding: 12px 44px 12px 44px;
background: rgba(255,255,255,0.055);
border: 1px solid rgba(255,255,255,0.11);
border-radius: 50px;
color: #c8daf0;
font-family: 'Exo 2', sans-serif;
font-size: 13.5px;
outline: none;
transition: border-color .25s, background .25s, box-shadow .25s;
}
input::placeholder { color: rgba(150, 175, 210, 0.4); }
input:focus {
border-color: rgba(63, 169, 245, 0.4);
background: rgba(63, 169, 245, 0.055);
box-shadow: 0 0 0 3px rgba(63, 169, 245, 0.08);
}

.eye-btn {
position: absolute; right: 15px;
background: none; border: none; cursor: pointer;
color: rgba(130, 155, 190, 0.55);
display: flex; align-items: center; padding: 4px;
transition: color .2s;
}
.eye-btn:hover { color: #3fa9f5; }

/* ─── LOGIN BUTTON ─── */
.btn-login {
width: 100%;
margin-top: 22px;
padding: 14px;
border: none;
border-radius: 50px;
background: linear-gradient(95deg, #1253b5 0%, #1976d2 28%, #b8880c 68%, #daa520 100%);
background-size: 200% 100%;
color: #ffffff;
font-family: 'Rajdhani', sans-serif;
font-size: 17px; font-weight: 700; letter-spacing: 5px;
text-transform: uppercase;
cursor: pointer;
position: relative; overflow: hidden;
transition: background-position .45s ease, box-shadow .3s, transform .12s;
box-shadow:
0 3px 20px rgba(18, 83, 181, 0.45),
0 2px 8px rgba(184, 136, 12, 0.25),
inset 0 1px 0 rgba(255,255,255,0.18);
}
.btn-login::after {
content: '';
position: absolute; inset: 0;
background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.14) 50%, transparent 100%);
transform: translateX(-110%);
transition: transform .55s ease;
}
.btn-login:hover {
background-position: 100% 0;
box-shadow: 0 6px 30px rgba(18,83,181,.55), 0 2px 12px rgba(184,136,12,.30);
transform: translateY(-1px);
}
.btn-login:hover::after { transform: translateX(110%); }
.btn-login:active { transform: translateY(1px); }
.btn-login:disabled { opacity:.5; cursor:not-allowed; transform:none; }

.spinner{display:inline-block;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── ERROR ─── */
.error-msg{
background:rgba(200,60,60,0.15);
border:1px solid rgba(200,60,60,0.2);
color:#e88;
padding:12px 16px;
border-radius:50px;
font-size:13px;
margin-bottom:14px;
display:none;
align-items:center;
gap:10px;
}
.error-msg.show{display:flex}

/* ─── LINKS ─── */
.links {
margin-top: 18px;
display: flex;
flex-direction: column;
align-items: center;
gap: 9px;
}
.links a {
font-size: 13px;
color: rgba(140, 165, 200, 0.75);
text-decoration: none;
transition: color .2s;
}
.links a:hover { color: #c8daf0; }
.links .accent {
color: #3fa9f5;
font-weight: 500;
}
.links .accent:hover { color: #80cfff; }

/* ─── Confirm overlay ─── */
.confirm-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:100;align-items:center;justify-content:center}
.confirm-overlay.show{display:flex}
.confirm-box{
background:rgba(6,13,26,0.95);
border:1px solid rgba(255,255,255,0.09);
border-radius:20px;
padding:32px;
max-width:360px;
width:90%;
text-align:center;
backdrop-filter:blur(16px);
}
.confirm-box h3{margin-bottom:12px;color:#e5e7eb;font-size:17px}
.confirm-box p{color:#6b7280;font-size:14px;margin-bottom:24px;line-height:1.5}
.confirm-btns{display:flex;gap:12px;justify-content:center}
.confirm-btns button{padding:12px 24px;border-radius:50px;border:none;font-weight:600;cursor:pointer;font-size:14px;font-family:inherit}
.btn-cancel{background:rgba(255,255,255,0.05);color:#9ca3af;border:1px solid rgba(255,255,255,0.08)}
.btn-cancel:hover{background:rgba(255,255,255,0.08)}
.btn-confirm{background:linear-gradient(95deg,#1253b5,#1976d2);color:#fff}

@media(max-width:380px){
.card-body{padding:0 22px}
.brand-name{font-size:28px}
.logo-row{gap:6px;padding:0 18px}
}
</style>

<div class="card">

    <div class="logo-row">

          <path d="M4,34 L15,68 L26,50 L34,63 L42,50 L53,68 L64,34"

        </svg>
      </div>
      <div class="logo-text-col">
        <div class="brand-name">WAS<span class="oo">OO</span>L</div>

  </div>

  <!-- ─── CARD BODY ─── -->
  <div class="card-body">

    <form id="loginForm" onsubmit="handleLogin(event)">

<script>
/* ═══ Circuit board background ═══ */
const canvas = document.getElementById('bg');
const ctx    = canvas.getContext('2d');

let W, H, nodes, segs, pulses;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function build() {
  nodes = []; segs = []; pulses = [];
  const G = 65;
  const cols = Math.ceil(W / G) + 2;
  const rows = Math.ceil(H / G) + 2;
  const grid = {};

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() < 0.62) {
        const key = r + '_' + c;
        const node = {
          x: c * G + (Math.random() * 8 - 4),
          y: r * G + (Math.random() * 8 - 4)
        };
        grid[key] = node;
        nodes.push(node);
      }
    }
  }
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const a = grid[r + '_' + c];
      if (!a) continue;
      const right = grid[r + '_' + (c+1)];
      const down  = grid[(r+1) + '_' + c];
      if (right && Math.random() < 0.5) segs.push({ a, b: right });
      if (down  && Math.random() < 0.5) segs.push({ a, b: down  });
    }
  }
  for (let i = 0; i < 14; i++) spawnPulse();
}

function spawnPulse() {
  if (!segs.length) return;
  const seg = segs[Math.floor(Math.random() * segs.length)];
  pulses.push({
    seg,
    t:       Math.random(),
    speed:   0.004 + Math.random() * 0.005,
    forward: Math.random() > 0.5
  });
}

function drawFrame() {
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#07101e';
  ctx.fillRect(0, 0, W, H);

  let g = ctx.createRadialGradient(W*.12, H*.88, 0, W*.12, H*.88, H*.60);
  g.addColorStop(0, 'rgba(15,80,170,0.28)');
  g.addColorStop(1, 'transparent');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

  let g2 = ctx.createRadialGradient(W*.90, H*.08, 0, W*.90, H*.08, H*.38);
  g2.addColorStop(0, 'rgba(160,110,10,0.07)');
  g2.addColorStop(1, 'transparent');
  ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.shadowColor = 'rgba(0,210,180,0.35)';
  ctx.shadowBlur  = 5;
  ctx.strokeStyle = 'rgba(0,200,172,0.13)';
  ctx.lineWidth   = 1;
  segs.forEach(s => {
    ctx.beginPath();
    ctx.moveTo(s.a.x, s.a.y);
    ctx.lineTo(s.b.x, s.b.y);
    ctx.stroke();
  });
  ctx.restore();

  ctx.save();
  ctx.shadowColor = 'rgba(0,220,185,0.7)';
  ctx.shadowBlur  = 6;
  nodes.forEach(n => {
    ctx.beginPath();
    ctx.arc(n.x, n.y, 1.6, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,210,178,0.38)';
    ctx.fill();
  });
  ctx.restore();

  ctx.save();
  pulses.forEach(p => {
    const frac = p.forward ? p.t : 1 - p.t;
    const x = p.seg.a.x + (p.seg.b.x - p.seg.a.x) * frac;
    const y = p.seg.a.y + (p.seg.b.y - p.seg.a.y) * frac;
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    const grad = ctx.createRadialGradient(x, y, 0, x, y, 4);
    grad.addColorStop(0, 'rgba(0,235,205,0.55)');
    grad.addColorStop(1, 'rgba(0,235,205,0)');
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,240,210,0.90)';
    ctx.shadowColor = 'rgba(0,240,210,1)';
    ctx.shadowBlur  = 10;
    ctx.fill();
  });
  ctx.restore();
}

function tick() {
  for (let i = pulses.length - 1; i >= 0; i--) {
    pulses[i].t += pulses[i].speed;
    if (pulses[i].t >= 1) {
      pulses.splice(i, 1);
      spawnPulse();
    }
  }
  while (pulses.length > 22) pulses.shift();
  drawFrame();
  requestAnimationFrame(tick);
}

resize();
build();
tick();
window.addEventListener('resize', () => { resize(); build(); });

/* ═══ Password toggle ═══ */
function togglePwd() {
  const p = document.getElementById('password');
  const eyeOpen = document.getElementById('eyeOpen');
  const eyeClosed = document.getElementById('eyeClosed');
  if (p.type === 'password') {
    p.type = 'text';
    eyeOpen.style.display = 'block';
    eyeClosed.style.display = 'none';
  } else {
    p.type = 'password';
    eyeOpen.style.display = 'none';
    eyeClosed.style.display = 'block';
  }
}
</script>
